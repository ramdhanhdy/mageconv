<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mageconv - local image converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .dropzone.dragover { @apply border-indigo-500 bg-indigo-50; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <div class="max-w-3xl mx-auto p-6">
    <header class="mb-8">
      <h1 class="text-3xl font-bold tracking-tight">mageconv</h1>
      <p class="text-slate-600 mt-1">
        Local-first image conversion. HEIC / PNG / JPEG &rarr; WebP / JPEG.
        EXIF is always stripped. Nothing leaves your machine.
      </p>
    </header>

    <form id="convert-form"
          hx-post="/convert"
          hx-encoding="multipart/form-data"
          hx-target="#result"
          hx-swap="innerHTML"
          hx-indicator="#spinner"
          class="bg-white shadow-sm rounded-xl p-6 space-y-5 border border-slate-200">

      <div id="dropzone"
           class="dropzone border-2 border-dashed border-slate-300 rounded-lg p-10 text-center cursor-pointer transition-colors hover:border-indigo-400">
        <p class="text-slate-600">
          <span class="font-semibold text-indigo-600">Drop images here</span>
          or click to choose files
        </p>
        <p class="text-xs text-slate-500 mt-2">
          Accepted: {{ accepted | join(", ") }}
        </p>
        <input id="file-input" type="file" name="files" multiple
               accept="{{ accepted | join(',') }}"
               class="hidden" />
        <p id="file-summary" class="mt-3 text-sm text-slate-700"></p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <label class="block">
          <span class="text-sm font-medium">Format</span>
          <select name="format"
                  class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2">
            {% for f in formats %}
              <option value="{{ f }}" {% if f == "webp" %}selected{% endif %}>{{ f }}</option>
            {% endfor %}
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-medium">Quality (1-100)</span>
          <input type="number" name="quality" value="85" min="1" max="100"
                 class="mt-1 w-full rounded-md border-slate-300 shadow-sm border p-2" />
        </label>

        <label class="block">
          <span class="text-sm font-medium">Max width (px, optional)</span>
          <input type="number" name="max_width" placeholder="e.g. 1920" min="1"
                 class="mt-1 w-full rounded-md border-slate-300 shadow-sm border p-2" />
        </label>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-md shadow-sm">
          Convert
        </button>
        <span id="spinner" class="htmx-indicator text-sm text-slate-500">
          Processing&hellip;
        </span>
      </div>
    </form>

    <section id="result" class="mt-6"></section>

    <footer class="mt-10 text-xs text-slate-500">
      Runs entirely on your machine. EXIF metadata is removed from every output.
    </footer>
  </div>

  <script>
    (function () {
      const dz = document.getElementById('dropzone');
      const input = document.getElementById('file-input');
      const summary = document.getElementById('file-summary');

      function updateSummary() {
        const files = input.files;
        if (!files || files.length === 0) { summary.textContent = ''; return; }
        const names = Array.from(files).slice(0, 3).map(f => f.name).join(', ');
        const more = files.length > 3 ? ` (+${files.length - 3} more)` : '';
        summary.textContent = `${files.length} file(s): ${names}${more}`;
      }

      dz.addEventListener('click', () => input.click());
      input.addEventListener('change', updateSummary);

      ['dragenter', 'dragover'].forEach(ev =>
        dz.addEventListener(ev, e => {
          e.preventDefault(); e.stopPropagation();
          dz.classList.add('dragover', 'border-indigo-500', 'bg-indigo-50');
        }));
      ['dragleave', 'drop'].forEach(ev =>
        dz.addEventListener(ev, e => {
          e.preventDefault(); e.stopPropagation();
          dz.classList.remove('dragover', 'border-indigo-500', 'bg-indigo-50');
        }));
      dz.addEventListener('drop', e => {
        if (e.dataTransfer && e.dataTransfer.files) {
          input.files = e.dataTransfer.files;
          updateSummary();
        }
      });
    })();
  </script>
</body>
</html>
